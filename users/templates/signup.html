{% extends "base.html" %}


{% block content %}

<main class="container">
    <div class="row">
        <div class="col-md-4 offset-md-4 mt-5">
            <form action="/signup/" method="post" class="card card-body">
                <h1 class="text-center">Sign up</h1>
                {% csrf_token %}


                <div class="mb-3">
                    <label for="username">Username:</label>
                    <input type="text" name="username" class="form-control" placeholder="Write your username">

                </div>

                <p class="text-danger-emphasis">{{ error }}</p>

                <div class="mb-3">
                    <label for="password1">Password:</label>
                    <input type="password" name="password1" class="form-control" placeholder="Your password">
                </div>
                <div class="mb-3">
                    <label for="password2">Confirm password:</label>
                    <input type="password" name="password2" class="form-control" placeholder="Confirm your password">
                </div>



            <button class="btn btn-primary">Signup</button>
            <p class="mt-3 text-center">Already have an account? <a href="/signin">Login</a></p>
            </form>
        </div>
    </div>
</main>

{% endblock %}
